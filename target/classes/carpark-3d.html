<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Car Park 3D View</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #stats-overlay {
    position: fixed; top: 12px; left: 12px;
    background: rgba(0,0,0,0.65); border: 1px solid rgba(0,140,255,0.3);
    border-radius: 6px; padding: 10px 16px; color: #aaccee;
    font-size: 12px; letter-spacing: 1px; z-index: 20;
    backdrop-filter: blur(6px); min-width: 200px;
  }
  #stats-overlay h3 { color: #44aaff; font-size: 13px; margin-bottom: 6px; letter-spacing: 2px; }
  .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .stat-val { color: #ffffff; font-weight: 600; }
  #slot-label {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 3px;
    text-transform: uppercase; z-index: 20;
  }
</style>
</head>
<body>
<div id="stats-overlay">
  <h3>CAR PARK SIM</h3>
  <div class="stat-row"><span>Occupied</span><span class="stat-val" id="s-occ">0 / 0</span></div>
  <div class="stat-row"><span>Occupancy</span><span class="stat-val" id="s-pct">0%</span></div>
  <div class="stat-row"><span>Produced</span><span class="stat-val" id="s-prod">0</span></div>
  <div class="stat-row"><span>Consumed</span><span class="stat-val" id="s-cons">0</span></div>
  <div class="stat-row"><span>Throughput</span><span class="stat-val" id="s-tp">0.00/s</span></div>
  <div class="stat-row"><span>Avg Wait</span><span class="stat-val" id="s-wait">0 ms</span></div>
</div>
<div id="slot-label">Parking Lot</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  SCENE
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1e);
scene.fog = new THREE.FogExp2(0x0a0a1e, 0.008);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 500);
camera.position.set(30, 25, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ── Lighting ──
const ambientLight = new THREE.AmbientLight(0x223344, 0.5);
scene.add(ambientLight);
const moonLight = new THREE.DirectionalLight(0x6688aa, 0.6);
moonLight.position.set(-30, 50, -20);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048,2048);
moonLight.shadow.camera.near = 0.5; moonLight.shadow.camera.far = 120;
moonLight.shadow.camera.left = -50; moonLight.shadow.camera.right = 50;
moonLight.shadow.camera.top = 50; moonLight.shadow.camera.bottom = -50;
moonLight.shadow.bias = -0.001;
scene.add(moonLight);
scene.add(new THREE.HemisphereLight(0x223355, 0x111122, 0.3));

// ── Street Lights ──
function createStreetLight(x, z) {
  const pm = new THREE.MeshStandardMaterial({color:0x444444,metalness:0.8,roughness:0.3});
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,5,8), pm);
  pole.position.set(x,2.5,z); pole.castShadow=true; scene.add(pole);
  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,1.5,6), pm);
  arm.rotation.z=Math.PI/2; arm.position.set(x+0.75,5,z); scene.add(arm);
  const housing = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.15,0.4),
    new THREE.MeshStandardMaterial({color:0x333333,metalness:0.7,roughness:0.4}));
  housing.position.set(x+1.2,4.95,z); scene.add(housing);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.12,12,12),
    new THREE.MeshStandardMaterial({color:0xffdd88,emissive:0xffaa44,emissiveIntensity:3}));
  bulb.position.set(x+1.2,4.85,z); scene.add(bulb);
  const pl = new THREE.PointLight(0xffaa55,1.8,20,2);
  pl.position.set(x+1.2,4.8,z); pl.castShadow=true;
  pl.shadow.mapSize.set(512,512); scene.add(pl);
  const glow = new THREE.Mesh(new THREE.CircleGeometry(4,32),
    new THREE.MeshBasicMaterial({color:0xffaa44,transparent:true,opacity:0.06}));
  glow.rotation.x=-Math.PI/2; glow.position.set(x+1.2,0.02,z); scene.add(glow);
}
createStreetLight(-14,-9); createStreetLight(12,-9);
createStreetLight(-14,9);  createStreetLight(12,9);
createStreetLight(-2,-18);

// ── Ground & Road ──
const ground = new THREE.Mesh(new THREE.PlaneGeometry(150,150),
  new THREE.MeshStandardMaterial({color:0x0d1a0d,roughness:0.95}));
ground.rotation.x=-Math.PI/2; ground.position.y=-0.02; ground.receiveShadow=true;
scene.add(ground);

const lotMesh = new THREE.Mesh(new THREE.PlaneGeometry(34,26),
  new THREE.MeshStandardMaterial({color:0x222230,roughness:0.75}));
lotMesh.rotation.x=-Math.PI/2; lotMesh.position.set(0,0.01,0); lotMesh.receiveShadow=true;
scene.add(lotMesh);

const road = new THREE.Mesh(new THREE.PlaneGeometry(7,70),
  new THREE.MeshStandardMaterial({color:0x1e1e28,roughness:0.7}));
road.rotation.x=-Math.PI/2; road.position.set(0,0.01,-35); road.receiveShadow=true;
scene.add(road);

for(let i=0;i<18;i++){
  const d=new THREE.Mesh(new THREE.PlaneGeometry(0.15,1.8),
    new THREE.MeshStandardMaterial({color:0xccaa00,emissive:0x443300,emissiveIntensity:0.3}));
  d.rotation.x=-Math.PI/2; d.position.set(0,0.025,-65+i*4); scene.add(d);
}
for(let side of[-3.2,3.2]){
  const l=new THREE.Mesh(new THREE.PlaneGeometry(0.1,70),
    new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222}));
  l.rotation.x=-Math.PI/2; l.position.set(side,0.025,-35); scene.add(l);
}

// ── Parking Spot Lines ──
function createParkingSpot(x,z,flipZ){
  const lm=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x111111});
  const lg=new THREE.PlaneGeometry(0.07,4.8);
  const left=new THREE.Mesh(lg,lm); left.rotation.x=-Math.PI/2; left.position.set(x-1.35,0.025,z); scene.add(left);
  const right=new THREE.Mesh(lg.clone(),lm); right.rotation.x=-Math.PI/2; right.position.set(x+1.35,0.025,z); scene.add(right);
  const bg=new THREE.PlaneGeometry(2.7,0.07);
  const back=new THREE.Mesh(bg,lm); back.rotation.x=-Math.PI/2; back.position.set(x,0.025,z+(flipZ?-2.4:2.4)); scene.add(back);
}
// Define all parking slot positions (up to 18 slots for flexibility)
const SLOT_POSITIONS = [];
for(let i=-4;i<=4;i++){
  SLOT_POSITIONS.push({x:i*3, z:-6, rotY:0});
  createParkingSpot(i*3,-6,false);
}
for(let i=-4;i<=4;i++){
  SLOT_POSITIONS.push({x:i*3, z:6, rotY:Math.PI});
  createParkingSpot(i*3,6,true);
}

// ── Curbs ──
function createCurb(x,y,z,w,h,d){
  const c=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
    new THREE.MeshStandardMaterial({color:0x555555,roughness:0.6}));
  c.position.set(x,y,z); c.castShadow=true; c.receiveShadow=true; scene.add(c);
}
createCurb(-17,0.15,0,0.3,0.3,26);
createCurb(17,0.15,0,0.3,0.3,26);
createCurb(0,0.15,13,34,0.3,0.3);

// ── Building ──
const building=new THREE.Mesh(new THREE.BoxGeometry(24,10,7),
  new THREE.MeshStandardMaterial({color:0x2a3344,roughness:0.85}));
building.position.set(0,5,20); building.castShadow=true; building.receiveShadow=true;
scene.add(building);
const roofB=new THREE.Mesh(new THREE.BoxGeometry(25,0.3,8),
  new THREE.MeshStandardMaterial({color:0x1a2233,roughness:0.7}));
roofB.position.set(0,10.15,20); scene.add(roofB);
for(let row=0;row<3;row++){for(let col=0;col<8;col++){
  const lit=Math.sin(col*3.7+row*2.3)>-0.3;
  const w=new THREE.Mesh(new THREE.PlaneGeometry(1.4,1.4),
    new THREE.MeshStandardMaterial({color:lit?0xffdd88:0x1a2233,
      emissive:lit?0xaa7722:0x000000,emissiveIntensity:lit?0.7:0}));
  w.position.set(-10.5+col*3,2.5+row*2.8,16.49); scene.add(w);
}}
const signB=new THREE.Mesh(new THREE.BoxGeometry(6,1.2,0.15),
  new THREE.MeshStandardMaterial({color:0x1133aa,emissive:0x0022aa,emissiveIntensity:0.5}));
signB.position.set(0,10.8,16.4); scene.add(signB);

// ── Trees ──
function createTree(x,z){
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.25,3,8),
    new THREE.MeshStandardMaterial({color:0x3d2b1a,roughness:0.9}));
  trunk.position.set(x,1.5,z); trunk.castShadow=true; scene.add(trunk);
  const cols=[0x1a4a1a,0x1d5a1d,0x206020];
  for(let i=0;i<3;i++){
    const f=new THREE.Mesh(new THREE.ConeGeometry(1.8-i*0.4,2-i*0.3,8),
      new THREE.MeshStandardMaterial({color:cols[i],roughness:0.85}));
    f.position.set(x,3.5+i*1.2,z); f.castShadow=true; scene.add(f);
  }
}
createTree(-22,12); createTree(22,12); createTree(-24,-6);
createTree(24,-6);  createTree(-22,-18); createTree(22,-18);

// ── Stars & Moon ──
const starGeo=new THREE.BufferGeometry();
const sPos=[];for(let i=0;i<800;i++)sPos.push((Math.random()-0.5)*300,30+Math.random()*70,(Math.random()-0.5)*300);
starGeo.setAttribute('position',new THREE.Float32BufferAttribute(sPos,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xccddff,size:0.2,sizeAttenuation:true})));
const moonSphere=new THREE.Mesh(new THREE.SphereGeometry(3,32,32),new THREE.MeshBasicMaterial({color:0xddeeff}));
moonSphere.position.set(-40,50,-60); scene.add(moonSphere);

// ============================================================
//  CAR BUILDER (for dynamic spawning)
// ============================================================
const CAR_COLORS = [0x2244aa,0xee1133,0x33aa44,0xdd8800,0x5522aa,0x22aaaa,0xaa2266,0x44bb88];

function buildCar(bodyColor){
  const g=new THREE.Group();
  const bm=new THREE.MeshStandardMaterial({color:bodyColor,metalness:0.7,roughness:0.25});
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.6,4.4),bm);
  body.position.y=0.55; body.castShadow=true; body.receiveShadow=true; g.add(body);
  const fender=new THREE.Mesh(new THREE.BoxGeometry(2.3,0.15,4.0),bm);
  fender.position.y=0.88; fender.castShadow=true; g.add(fender);
  const cab=new THREE.Mesh(new THREE.BoxGeometry(1.85,0.55,2.2),
    new THREE.MeshStandardMaterial({color:0x88ccff,metalness:0.95,roughness:0.05,transparent:true,opacity:0.4}));
  cab.position.set(0,1.22,-0.15); g.add(cab);
  const rf=new THREE.Mesh(new THREE.BoxGeometry(1.95,0.08,2.0),bm);
  rf.position.set(0,1.52,-0.15); rf.castShadow=true; g.add(rf);
  const wg=new THREE.CylinderGeometry(0.3,0.3,0.2,16);
  const wm=new THREE.MeshStandardMaterial({color:0x111111,roughness:0.8});
  const rg=new THREE.CylinderGeometry(0.16,0.16,0.22,8);
  const rm=new THREE.MeshStandardMaterial({color:0xaaaaaa,metalness:0.9,roughness:0.1});
  [[-1.15,0.3,1.4],[1.15,0.3,1.4],[-1.15,0.3,-1.4],[1.15,0.3,-1.4]].forEach(([wx,wy,wz])=>{
    const w=new THREE.Mesh(wg,wm); w.rotation.z=Math.PI/2; w.position.set(wx,wy,wz); w.castShadow=true; g.add(w);
    const r=new THREE.Mesh(rg,rm); r.rotation.z=Math.PI/2; r.position.set(wx,wy,wz); g.add(r);
  });
  const hlg=new THREE.SphereGeometry(0.13,8,8);
  const hlm=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffcc,emissiveIntensity:0.3});
  g.add(Object.assign(new THREE.Mesh(hlg,hlm),{position:new THREE.Vector3(-0.75,0.55,2.25)}));
  g.add(Object.assign(new THREE.Mesh(hlg,hlm),{position:new THREE.Vector3(0.75,0.55,2.25)}));
  const tlg=new THREE.SphereGeometry(0.1,8,8);
  const tlm=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:0.5});
  g.add(Object.assign(new THREE.Mesh(tlg,tlm),{position:new THREE.Vector3(-0.85,0.55,-2.25)}));
  g.add(Object.assign(new THREE.Mesh(tlg,tlm),{position:new THREE.Vector3(0.85,0.55,-2.25)}));
  return g;
}

// ============================================================
//  DYNAMIC SLOT MANAGEMENT (called from Java via WebEngine)
// ============================================================
const slotCars = {};  // slotIndex -> THREE.Group

/**
 * Called from Java: add a car to a specific slot.
 * @param {number} slotIndex - 0-based slot index
 * @param {number} colorIndex - index into CAR_COLORS
 */
function addCarToSlot(slotIndex, colorIndex) {
  if (slotCars[slotIndex]) return; // already occupied
  if (slotIndex >= SLOT_POSITIONS.length) return;
  const slot = SLOT_POSITIONS[slotIndex];
  const color = CAR_COLORS[colorIndex % CAR_COLORS.length];
  const car = buildCar(color);
  car.position.set(slot.x, 0, slot.z);
  car.rotation.y = slot.rotY;
  // Animate: start small, scale up
  car.scale.set(0.01, 0.01, 0.01);
  car.userData.targetScale = 1;
  car.userData.animating = true;
  scene.add(car);
  slotCars[slotIndex] = car;
}

/**
 * Called from Java: remove a car from a specific slot.
 * @param {number} slotIndex - 0-based slot index
 */
function removeCarFromSlot(slotIndex) {
  const car = slotCars[slotIndex];
  if (!car) return;
  car.userData.targetScale = 0;
  car.userData.removing = true;
}

/**
 * Called from Java: update the stats overlay.
 */
function updateStats(occupied, capacity, produced, consumed, throughput, avgWait) {
  document.getElementById('s-occ').textContent = occupied + ' / ' + capacity;
  document.getElementById('s-pct').textContent = (capacity > 0 ? Math.round(occupied/capacity*100) : 0) + '%';
  document.getElementById('s-prod').textContent = produced;
  document.getElementById('s-cons').textContent = consumed;
  document.getElementById('s-tp').textContent = throughput.toFixed(2) + '/s';
  document.getElementById('s-wait').textContent = Math.round(avgWait) + ' ms';
}

/** Called from Java: clear all cars (on reset). */
function clearAllCars() {
  for (const idx in slotCars) {
    scene.remove(slotCars[idx]);
  }
  for (const key in slotCars) delete slotCars[key];
}

// ============================================================
//  RENDER LOOP
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Gentle orbit camera
  camera.position.x = Math.cos(time * 0.12) * 35;
  camera.position.z = Math.sin(time * 0.12) * 35;
  camera.position.y = 20 + Math.sin(time * 0.08) * 3;
  camera.lookAt(0, 1, 0);

  // Animate car spawn/despawn
  for (const idx in slotCars) {
    const car = slotCars[idx];
    if (car.userData.animating) {
      const s = car.scale.x + (car.userData.targetScale - car.scale.x) * 0.12;
      car.scale.set(s, s, s);
      if (Math.abs(s - car.userData.targetScale) < 0.01) {
        car.scale.set(car.userData.targetScale, car.userData.targetScale, car.userData.targetScale);
        car.userData.animating = false;
      }
    }
    if (car.userData.removing) {
      const s = car.scale.x * 0.85;
      car.scale.set(s, s, s);
      if (s < 0.02) {
        scene.remove(car);
        delete slotCars[idx];
      }
    }
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
